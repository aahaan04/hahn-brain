# Light theme on startup (matches the app's default) so there's no dark flash.
[theme]
base = "light"
primaryColor = "#f43737"
backgroundColor = "#f4efe7"
secondaryBackgroundColor = "#ffffff"
textColor = "#201919"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless = true

[client]
# Removes the top-right toolbar / hamburger menu for a clean, app-like look.
toolbarMode = "minimal"
showErrorDetails = false
